name: "CI Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-l12-stable-ubuntu-84:
    runs-on: ubuntu-latest
    name: P8.4 - L12 - stable - ubuntu
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none
      - run: composer require "laravel/framework:12.*" "orchestra/testbench:10.*" "nesbot/carbon:3.*" --no-interaction --no-update
      - run: composer update --prefer-stable --prefer-dist --no-interaction
      - run: vendor/bin/pest --ci

  test-l12-lowest-ubuntu-84:
